<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Gerenciar Repertórios</title>
    <style>
        :root { --primary: #186879; --bg: #f5f7f8; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); margin: 0; padding-top: 70px; }
        
        .header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: white; display: flex; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #ddd; z-index: 1000; 
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* O INPUT - Agora forçado a aparecer */
        .input-box { 
            background: white; padding: 15px; border-radius: 12px; 
            display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        input { 
            flex: 1; padding: 12px; border: 1px solid #ccc; 
            border-radius: 8px; font-size: 16px; 
        }

        button.main-btn { 
            background: var(--primary); color: white; border: none; 
            padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .folder-card { 
            background: white; padding: 12px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px; border: 1px solid #eee;
        }
        
        .btn-icon { background: none; border: none; color: var(--primary); cursor: pointer; }
        .btn-icon.delete { color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color: var(--primary); margin-right: 15px;"><span class="material-icons">arrow_back</span></a>
        <b style="color: var(--primary)">MEUS REPERTÓRIOS</b>
    </div>

    <div class="container">
        <div class="input-box">
            <input type="text" id="rep-input" placeholder="Nome do repertório...">
            <button class="main-btn" onclick="App.save()">CRIAR</button>
        </div>

        <div id="repertorios-list">
            <p style="text-align:center; color:#999;">Carregando banco de dados...</p>
        </div>
    </div>
<script src="cordova.js"></script>
    <script src='js/pouchdb.min.js'></script>
    <script src='js/pouchdb.find.min.js'></script>  
    <script src="js/database.js"></script>

    <script>
        const App = {
            // Tenta pegar o banco de qualquer lugar possível
            get db() {
                return window.db || (typeof db !== 'undefined' ? db : null);
            },

            async init() {
                console.log("Tentando conectar ao banco...");
                
                // 1. Espera o DBManager (do seu database.js) terminar o init
                if (typeof DBManager !== 'undefined') {
                    await DBManager.init();
                }

                // 2. Loop de espera (Até 5 segundos) para o banco aparecer
                let tentativas = 0;
                while (!this.db && tentativas < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    tentativas++;
                }

                if (this.db) {
                    console.log("✅ Banco conectado!");
                    this.render();
                } else {
                    document.getElementById('repertorios-list').innerHTML = 
                        "<b style='color:red'>Erro crítico: O banco de dados não iniciou.</b>";
                }
            },

            async render() {
                const list = document.getElementById('repertorios-list');
                try {
                    // Busca documentos onde tipo == 'repertorio'
                    const res = await this.db.find({ selector: { tipo: 'repertorio' } });
                    
                    if (res.docs.length === 0) {
                        list.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum repertório criado.</p>";
                        return;
                    }

list.innerHTML = res.docs
    .sort((a, b) => a.nome.localeCompare(b.nome))
    .map(doc => {
        const qtd = doc.musicas ? doc.musicas.length : 0;
        return `
            <div class="folder-card" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="material-icons" style="color: var(--primary)">queue_music</i>
                    <div>
                        <b style="display: block; color: var(--primary)">${doc.nome}</b>
                        <small style="color: #666">${qtd} incluído(s)</small>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-icon" onclick="window.location.href='musicasRepertorio.html?id=${doc._id}'" title="Ver Músicas">
                        <i class="material-icons">receipt_long</i>
                    </button>
                    <button class="btn-icon delete" onclick="App.delete('${doc._id}')" title="Excluir">
                        <i class="material-icons">delete</i>
                    </button>
                </div>
            </div>
        `;
    }).join('');
                } catch (e) {
                    console.error(e);
                }
            },

            async save() {
                const val = document.getElementById('rep-input').value.trim();
                if (!val) return alert("Digite um nome!");
                if (!this.db) return alert("Banco ainda não carregado!");

                try {
// No repertorio.html, dentro da função save():
await this.db.put({
    _id: 'rep_' + Date.now(),
    type: 'repertorio', // Mudei de 'tipo' para 'type'
    nome: val,
    musicas: []
});
                    document.getElementById('rep-input').value = '';
                    this.render();
                } catch (e) {
                    alert("Erro ao salvar!");
                }
            },

            async delete(id) {
                if (confirm("Excluir?")) {
                    const doc = await this.db.get(id);
                    await this.db.remove(doc);
                    this.render();
                }
            }
        };

        // Inicia
        window.onload = () => App.init();
    </script>
</body>
</html>
