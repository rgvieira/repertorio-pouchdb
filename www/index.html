    <style>
        /* Ajuste do FAB Menu para aparecer sobre os elementos */
 /* Local: Adicione ou substitua no seu <style> */
.fab-menu {
    right: 0;
    top: 50px; /* Ajustado para não sobrepor o botão trigger */
    width: 200px; /* Um pouco mais largo para facilitar o toque */
}

/* Garante que os ícones do menu sejam fáceis de clicar em qualquer celular */
.tooltip-item {
    min-height: 48px; 
}
        .fab-menu.open { display: block; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            text-decoration: none;
            color: #333;
            gap: 10px;
        }
        .menu-item:hover { background: #f5f5f5; }
        .fab-container { position: relative; }

        /* Local: Adicione no final da sua tag <style> que já existe no head */

.music-list {
    width: 100%;
    overflow-x: auto; /* Permite scroll horizontal na tabela se necessário em telas minúsculas */
    -webkit-overflow-scrolling: touch;
}

table {
    min-width: 450px; /* Garante que os dados não fiquem encavalados */
}

/* Esconde o Gênero em telas muito pequenas para dar espaço ao Título */
@media (max-width: 480px) {
    th:nth-child(1), td:nth-child(1) {
        display: none; 
    }
    table {
        min-width: 100%; /* Em telas pequenas, ocupa apenas o que tem */
    }
}

/* Ajuste do Título para não quebrar a linha e sim colocar "..." */
#lista-musicas td {
    max-width: 150px; /* Limite para o texto não empurrar a tabela */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 12px 8px;
}

    </style>
</head>

<a href="repertorio.html" class="tooltip-item" data-tooltip="Meus Repertórios" style="display: flex; align-items: center; justify-content: center; padding: 15px; text-decoration: none; border-bottom: 1px solid #f5f5f5; position: relative;">

<script>
    // Função do FAB Menu
function toggleFabMenu() {
    const menu = document.getElementById('fab-menu');
    // Alterna entre block e none
    if (menu.style.display === 'none' || menu.style.display === '') {
        menu.style.display = 'block';
    } else {
        menu.style.display = 'none';
    }
}

// Fecha o menu se o usuário clicar em qualquer lugar fora dele
document.addEventListener('click', function(event) {
    const container = document.querySelector('.fab-container');
    const menu = document.getElementById('fab-menu');
    if (container && !container.contains(event.target)) {
        menu.style.display = 'none';
    }
});

    window.onerror = function(msg) { if (msg.includes('hasService')) return true; };
    
    // Inicialização segura
    setTimeout(() => {
        if (typeof onDeviceReady === 'function' && !window.app_initialized) onDeviceReady();
    }, 1200);
</script>

<style>
