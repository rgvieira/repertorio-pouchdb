<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Configurações</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.nodeRequire = (typeof require !== 'undefined') ? require : (window.require ? window.require : null);
    </script>
    <style>
        #loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1abc9c; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        body { padding-top: env(safe-area-inset-top); font-family: 'Manrope', sans-serif; background: #f5f5f5; margin: 0; color: #333; }
        .card { background: #fff; padding: 20px; border-radius: 12px; margin: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .folder-card { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .folder-card span { font-size: 13px; color: #555; word-break: break-all; margin-right: 10px; }
        
        .btn-main { display: flex; align-items: center; gap: 8px; padding: 15px; background: #186879; color: #fff; border: none; border-radius: 8px; width: 100%; justify-content: center; font-weight: bold; cursor: pointer; }
        .btn-danger { margin-top: 20px; width: 100%; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 8px; display:flex; align-items:center; justify-content:center; gap:8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="spinner"></div>
    <p id="loader-text">Processando...</p>
</div>

<div class="top-bar" style="display: flex; align-items: center; padding: 0 16px; height: 56px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100;">
    <a href="index.html" style="text-decoration: none; color: #186879;"><span class="material-icons">arrow_back</span></a>
    <div style="font-weight: 800; color: #186879; font-size: 1.1rem; margin-left:15px;">Configurações da Biblioteca</div>
</div>

<div class="config-content">
    <div class="card">
        <h2 style="margin-top:0; font-size: 1.2rem; color: #186879;">Pastas de Partituras</h2>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">Adicione as pastas do seu dispositivo que contêm arquivos PDF.</p>

        <button id="btnFolderPicker" class="btn-main">
            <span class="material-icons">create_new_folder</span> Vincular Nova Pasta
        </button>

        <div id="folders-list" style="margin-top: 20px;"></div>
    </div>

    <div style="padding: 0 15px;">
        <button onclick="ConfigApp.instance.clearAll()" class="btn-danger">
            <span class="material-icons">delete_sweep</span> Limpar Tudo e Recomeçar
        </button>
    </div>
</div>

<script src="cordova.js"></script>
<script src="js/pouchdb.min.js"></script>
<script src="js/pouchdb.find.js"></script>
<script src="js/database.js"></script>
<script src="js/scanner.js"></script>
<script src="js/app.js"></script>

<script>

    // ========== FUNÇÃO UTILITÁRIA (ANTES do ConfigApp) ==========
window.getFolderNameFromUri = function(uri) {
    try {
        let decoded = decodeURIComponent(uri);
        const parts = decoded.split('/');
        const name = parts[parts.length - 1];
        
        const cleanName = name
            .replace(/^primary:/i, '')
            .replace(/^tree:/i, '')
            .replace(/^document:/i, '')
            .trim();
        
        return cleanName || 'Pasta';
    } catch (e) {
        return 'Pasta';
    }
};

function showToast(message, duration = 3000) {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed;
        bottom: 20px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 0.9rem;
        z-index: 9999;
        animation: fadeIn 0.3s ease;
    `;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, duration);
}

window.showToast = showToast;

// Adicione CSS para animação
const style = document.createElement('style');
style.textContent = `
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
`;
document.head.appendChild(style);

class ConfigApp {
    constructor() {
        this.foldersListEl = document.getElementById('folders-list');
        this.loader = document.getElementById('loader-overlay');
        this.loaderText = document.getElementById('loader-text');
    }

    async init() {
        console.log("ConfigApp: Iniciando...");
        const ok = await DBManager.init();
        if (ok) {
            await this.loadFoldersList();
        } else {
            window.showToast("Erro ao conectar ao banco de dados.");
        }
    }

    async loadFoldersList() {
        try {
            const folders = await DBManager.listFolders();
            
            if (folders.length === 0) {
                this.foldersListEl.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">Nenhuma pasta vinculada ainda.</p>';
                return;
            }

            this.foldersListEl.innerHTML = '<h3 style="font-size:1rem;color:#186879;margin-bottom:10px;">Pastas vinculadas:</h3>';
            
            folders.forEach(f => {
                const div = document.createElement('div');
                div.className = 'folder-card';
                
                // Mostra apenas o último segmento do URI
                const displayName = f.name;
                
                div.innerHTML = `
                    <span>${displayName}<br><small style="color:#999">${displayName}...</small></span>
                    <span class="material-icons" style="color:#e74c3c; cursor:pointer; padding:5px;" 
                          onclick="ConfigApp.instance.handleDelete('${f._id}')">delete</span>
                `;
                this.foldersListEl.appendChild(div);
            });
        } catch (e) {
            console.error("Erro ao carregar lista de pastas:", e);
        }
    }

    async handleDelete(id) {
        if (!confirm('Deseja desvincular esta pasta? As músicas continuarão no banco até a próxima limpeza.')) {
            return;
        }
        
        await DBManager.deleteFolder(id);
        await this.loadFoldersList();
        window.showToast('✅ Pasta desvinculada!');
    }

    async clearAll() {
        if (!confirm('⚠️ Isso apagará TODAS as músicas e pastas configuradas. Tem certeza?')) {
            return;
        }
        
        this.showLoader(true, "Limpando banco...");
        await DBManager.limparBanco();
        this.showLoader(false);
        location.reload();
    }

    showLoader(show, text = "Processando...") {
        this.loaderText.innerText = text;
        this.loader.style.display = show ? 'flex' : 'none';
    }
}

// Inicialização
document.addEventListener('deviceready', async () => {
    console.log('--- Config: Deviceready ---');
    
    ConfigApp.instance = new ConfigApp();
    await ConfigApp.instance.init();
    
    // Sobrescreve FolderPicker SE necessário
    if (!cordova.plugins || !cordova.plugins.FolderPicker) {
        cordova.plugins = cordova.plugins || {};
        cordova.plugins.FolderPicker = {
            openFolderPicker: function(success, error) {
                cordova.exec(success, error, 'FolderPicker', 'openFolderPicker', []);
            }
        };
    }
    
    console.log('✅ ConfigApp inicializado');
}, false);

// Botão Vincular Nova Pasta
document.addEventListener("DOMContentLoaded", () => {
    const btnPick = document.getElementById("btnFolderPicker");
    
    if (!btnPick) return;
    
    btnPick.addEventListener("click", async () => {
        console.log("📂 Botão clicado -abrindo FolderPicker...");
        
        if (!window.cordova || !cordova.plugins || !cordova.plugins.FolderPicker) {
            window.showToast("❌ FolderPicker não disponível.\nPlugins: " + JSON.stringify(cordova.plugins ? Object.keys(cordova.plugins) : []));
            return;
        }
        
        ConfigApp.instance.showLoader(true, "Abrindo seletor de pasta...");
        
        cordova.plugins.FolderPicker.openFolderPicker(
            async function(uri) {
                console.log("📂 Pasta escolhida:", uri);
                
                ConfigApp.instance.showLoader(true, "Vinculando pasta...");
                
                try {
                    // 1. Salva no PouchDB
                    const added = await DBManager.addFolder(uri);
                    
                    if (!added) {
                        throw new Error("Falha ao salvar pasta no banco");
                    }
                    
                    // 2. Escaneia a pasta em busca de PDFs
                    ConfigApp.instance.showLoader(true, "Escaneando pasta em busca de PDFs...");
                    await Scanner.escanearPasta(uri);
                    
                    // 3. Atualiza lista
                    await ConfigApp.instance.loadFoldersList();
                    
                    ConfigApp.instance.showLoader(false);
                    
                    window.showToast("✅ Pasta vinculada com sucesso!\n\nPDFs encontrados e salvos no banco.");
                    
                } catch (e) {
                    console.error("❌ Erro ao processar pasta:", e);
                    ConfigApp.instance.showLoader(false);
                    window.showToast("❌ Erro: " + e.message);
                }
            },
            function(err) {
                console.error("❌ Erro FolderPicker:", err);
                ConfigApp.instance.showLoader(false);
                window.showToast("❌ Erro ao escolher pasta: " + JSON.stringify(err));
            }
        );
    });
});

// Fallback para navegador/Zorin
if (!window.cordova) {
    window.onload = () => {
        if (!ConfigApp.instance) {
            ConfigApp.instance = new ConfigApp();
            ConfigApp.instance.init();
        }
    };
}
</script>
</body>
</html>
