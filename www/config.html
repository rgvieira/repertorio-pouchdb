<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Configurações</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.nodeRequire = (typeof require !== 'undefined') ? require : (window.require ? window.require : null);
        if (typeof module === 'object') { window.electronModule = module; window.module = undefined; }
    </script>
</head>
<body>

<div class="top-bar" style="display: flex; align-items: center; padding: 0 16px; height: 56px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000;">
    <a href="index.html" style="text-decoration: none; color: #186879; display: flex; align-items: center; margin-right: 12px;">
        <span class="material-icons">arrow_back</span>
    </a>
    <div style="font-weight: 800; color: #186879; font-size: 1.1rem;">Configurações</div>
</div>

<div class="config-content" style="padding: 16px; max-width: 800px; margin: 0 auto;">
    <div id="desktop-section" class="card">
        <h2>Pastas</h2>
        <p>Sincronize pastas para alimentar sua biblioteca.</p>
        
        <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <!--<input type="text" id="root-folder-input" class="form-input" style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" placeholder="Caminho da pasta...">-->
            <button id="select-folder-btn" class="btn-picker" style="display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: #186879; color: #fff; border: none; border-radius: 8px; cursor: pointer;">
 <span class="material-icons">folder_open</span> 

                <span id="btn-label">Nova Pasta</span>
            </button>
        </div>

        <div style="margin-top: 24px;">
            <h3 style="font-size: 0.8rem; color: #666; text-transform: uppercase;">Pastas Ativas</h3>
            <div id="folders-list"></div>
        </div>
    </div>

    <button id="btn-clear" class="btn-danger" style="margin-top: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span class="material-icons">delete_forever</span> Limpar Banco de Dados
    </button>
</div>

<script src='js/pouchdb.min.js'></script>
<script src='js/pouchdb.find.min.js'></script>  
<script src="js/database.js"></script>
<script src="js/scanner.js"></script>

<script>
    class ConfigApp {
        constructor() {
            this.foldersListEl = document.getElementById('folders-list');
            this.rootInputEl = document.getElementById('root-folder-input');
            this.selectBtnEl = document.getElementById('select-folder-btn');
            this.clearBtnEl = document.getElementById('btn-clear');
            
            this.isElectron = (typeof process !== 'undefined' && !!(process.versions && process.versions.electron));

            if (!this.isElectron) {
                document.getElementById('btn-label').innerText = "Salvar";
                this.rootInputEl.readOnly = false;
                this.rootInputEl.placeholder = "Digite o caminho manualmente...";
            }

            this.init();
        }

        async init() {
            try {
                if (typeof DBManager !== 'undefined') await DBManager.init();
                await this.loadFoldersList();

                if (this.selectBtnEl) {
                    this.selectBtnEl.onclick = () => {
                        if (this.isElectron) this.selectFolder();
                        else this.manualSave();
                    };
                }
                if (this.clearBtnEl) this.clearBtnEl.onclick = () => this.clearAll();
            } catch (err) { console.error(err); }
        }

        async manualSave() {
            const path = this.rootInputEl.value.trim();
            if (!path) return showToast("Digite o caminho!");
            if (await DBManager.addFolder(path)) {
                this.rootInputEl.value = '';
                await this.loadFoldersList();
            }
        }

        async loadFoldersList() {
            if (!this.foldersListEl) return;
            try {
                const folders = await DBManager.listFolders();
                this.foldersListEl.innerHTML = folders.length ? '' : 'Nenhuma pasta ativa';
                for (const folder of folders) {
                    const div = document.createElement('div');
                    div.className = 'folder-card';
                    div.style = "display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;";
                    div.innerHTML = `
                        <div style="min-width: 0; flex: 1;">
                            <b>${folder.path.split(/[\\/]/).pop() || 'Pasta'}</b>
                            <div style="font-size: 0.7rem; color: #888;">${folder.path}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <span class="material-icons" style="color: #186879; cursor: pointer;" onclick="ConfigApp.instance.refreshFolder('${folder._id}', '${folder.path}')">refresh</span>
                            <span class="material-icons" style="color: #f44336; cursor: pointer;" onclick="ConfigApp.instance.deleteFolder('${folder._id}')">delete</span>
                        </div>
                    `;
                    this.foldersListEl.appendChild(div);
                }
            } catch (err) { console.error(err); }
        }

        async selectFolder() {
            const path = await Scanner.abrirPicker();
            if (path && await DBManager.addFolder(path)) {
                await Scanner.escanearPasta(path);
                await this.loadFoldersList();
            }
        }

        async refreshFolder(id, path) {
            if (confirm('Rescanear esta pasta?')) {
                await Scanner.escanearPasta(path);
                await this.loadFoldersList();
            }
        }

        async deleteFolder(id) {
            if (confirm('Remover esta pasta?')) {
                await DBManager.deleteFolder(id);
                await this.loadFoldersList();
            }
        }

        async clearAll() {
            if (confirm('LIMPAR TUDO?')) {
                await DBManager.limparBanco();
                await this.loadFoldersList();
            }
        }
    }

    ConfigApp.instance = new ConfigApp();
</script>
</body>
</html>
