<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Configurações</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.nodeRequire = (typeof require !== 'undefined') ? require : (window.require ? window.require : null);
        if (typeof module === 'object') { window.electronModule = module; window.module = undefined; }
    </script>
        <style>
            #loader-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.8); z-index: 9999;
    display: none; align-items: center; justify-content: center; flex-direction: column;
}
.spinner {
    width: 50px; height: 50px; border: 5px solid #f3f3f3;
    border-top: 5px solid #186879; border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
</head>
<body>

    <div id="loader-overlay">
    <div class="spinner"></div>
    <p style="color: #186879; font-weight: bold; margin-top: 10px;">Escaneando arquivos...</p>
</div>

<div class="top-bar" style="display: flex; align-items: center; padding: 0 16px; height: 56px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000;">
    <a href="index.html" style="text-decoration: none; color: #186879; display: flex; align-items: center; margin-right: 12px;">
        <span class="material-icons">arrow_back</span>
    </a>
    <div style="font-weight: 800; color: #186879; font-size: 1.1rem;">Configurações</div>
</div>

<div class="config-content" style="padding: 16px; max-width: 800px; margin: 0 auto;">
    <div id="desktop-section" class="card">
        <h2>Pastas</h2>
        <p>Sincronize pastas para alimentar sua biblioteca.</p>
        
        <div class="form-row" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <!--<input type="text" id="root-folder-input" class="form-input" style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" placeholder="Caminho da pasta...">-->
            <button id="select-folder-btn" class="btn-picker" style="display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: #186879; color: #fff; border: none; border-radius: 8px; cursor: pointer;">
 <span class="material-icons">folder_open</span> 

                <span id="btn-label">Nova Pasta</span>
            </button>
        </div>

        <div style="margin-top: 24px;">
            <h3 style="font-size: 0.8rem; color: #666; text-transform: uppercase;">Pastas Ativas</h3>
            <div id="folders-list"></div>
        </div>
    </div>

    <button id="btn-clear" class="btn-danger" style="margin-top: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span class="material-icons">delete_forever</span> Limpar Banco de Dados
    </button>
</div>

<script src='js/pouchdb.min.js'></script>
<script src='js/pouchdb.find.min.js'></script>  
<script src="js/database.js"></script>
<script src="js/scanner.js"></script>

<script>
 class ConfigApp {
    constructor() {
        this.foldersListEl = document.getElementById('folders-list');
        this.selectBtnEl = document.getElementById('select-folder-btn');
        this.clearBtnEl = document.getElementById('btn-clear');
        this.loader = document.getElementById('loader-overlay');
        
        // Melhor detecção para Electron via Ponte
        this.isElectron = !!(window.electronAPI);

        this.init();
    }

    async init() {
        try {
            // Garante que o DBManager iniciou antes de listar
            if (typeof DBManager !== 'undefined') {
                await DBManager.init();
            } else {
                console.error("DBManager não definido!");
            }
            
            await this.loadFoldersList();

            if (this.selectBtnEl) {
                this.selectBtnEl.onclick = () => this.selectFolder();
            }
            if (this.clearBtnEl) {
                this.clearBtnEl.onclick = () => this.clearAll();
            }
        } catch (err) { 
            console.error("Erro no Init:", err); 
        }
    }

    showLoader(show) {
        this.loader.style.display = show ? 'flex' : 'none';
    }

    async loadFoldersList() {
        if (!this.foldersListEl) return;
        try {
            const folders = await DBManager.listFolders();
            console.log("Pastas carregadas:", folders); // Debug
            
            this.foldersListEl.innerHTML = folders.length ? '' : '<p style="padding:10px;">Nenhuma pasta ativa</p>';
            
            folders.forEach(folder => {
                const div = document.createElement('div');
                div.className = 'folder-card';
                div.style = "display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 8px;";
                
                const pathSeguro = folder.path.replace(/\\/g, '\\\\');

                div.innerHTML = `
                    <div class="folder-info" style="display:flex; align-items:center; gap:10px; overflow:hidden;">
                        <span class="material-icons" style="color:#666">folder</span>
                        <span class="folder-path" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem;">${folder.path}</span>
                    </div>
                    <div class="folder-actions" style="display:flex; gap:15px; margin-left:10px;">
                        <span class="material-icons" style="color: #186879; cursor: pointer;" 
                              onclick="ConfigApp.instance.handleRefresh('${folder._id}', '${pathSeguro}')">refresh</span>
                        <span class="material-icons" style="color: #f44336; cursor: pointer;" 
                              onclick="ConfigApp.instance.handleDelete('${folder._id}')">delete</span>
                    </div>
                `;
                this.foldersListEl.appendChild(div);
            });
        } catch (err) { 
            console.error("Erro ao listar pastas:", err); 
            this.foldersListEl.innerHTML = "Erro ao carregar pastas.";
        }
    }

    async selectFolder() {
        try {
            const path = await Scanner.abrirPicker();
            if (path) {
                this.showLoader(true);
                // Adiciona ao banco
                const added = await DBManager.addFolder(path);
                if (added) {
                    // Escaneia
                    await Scanner.escanearPasta(path);
                    await this.loadFoldersList();
                }
            }
        } catch (err) {
            console.error(err);
        } finally {
            this.showLoader(false);
        }
    }

    async handleRefresh(id, path) {
        if (confirm('Rescanear esta pasta?')) {
            this.showLoader(true);
            try {
                await Scanner.escanearPasta(path);
                alert("Sincronização concluída!");
            } catch (err) {
                console.error(err);
            } finally {
                this.showLoader(false);
                await this.loadFoldersList();
            }
        }
    }

    async handleDelete(id) {
        if (confirm('Remover esta pasta? Os arquivos continuarão no disco, mas sairão do app.')) {
            await DBManager.deleteFolder(id);
            await this.loadFoldersList();
        }
    }

    async clearAll() {
        if (confirm('ISSO APAGARÁ TODO O SEU BANCO DE DADOS. Tem certeza?')) {
            this.showLoader(true);
            try {
                await DBManager.limparBanco();
                await this.loadFoldersList();
            } finally {
                this.showLoader(false);
            }
        }
    }
}

// Inicializa a instância
window.onload = () => {
    ConfigApp.instance = new ConfigApp();
};

   
</script>
</body>
</html>
