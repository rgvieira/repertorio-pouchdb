<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="initial-scale=1, width=device-width, viewport-fit=cover" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <title>Biblioteca</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ajuste do FAB Menu para aparecer sobre os elementos */
 /* Local: Adicione ou substitua no seu <style> */
.fab-menu {
    right: 0;
    top: 50px; /* Ajustado para não sobrepor o botão trigger */
    width: 200px; /* Um pouco mais largo para facilitar o toque */
}

/* Garante que os ícones do menu sejam fáceis de clicar em qualquer celular */
.tooltip-item {
    min-height: 48px; 
}
        .fab-menu.open { display: block; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            text-decoration: none;
            color: #333;
            gap: 10px;
        }
        .menu-item:hover { background: #f5f5f5; }
        .fab-container { position: relative; }

        /* Local: Adicione no final da sua tag <style> que já existe no head */

.music-list {
    width: 100%;
    overflow-x: auto; /* Permite scroll horizontal na tabela se necessário em telas minúsculas */
    -webkit-overflow-scrolling: touch;
}

table {
    min-width: 450px; /* Garante que os dados não fiquem encavalados */
}

/* Esconde o Gênero em telas muito pequenas para dar espaço ao Título */
@media (max-width: 480px) {
    th:nth-child(1), td:nth-child(1) {
        display: none; 
    }
    table {
        min-width: 100%; /* Em telas pequenas, ocupa apenas o que tem */
    }
}
.btn-icon {
  position: relative;
}
/* Diminui a fonte geral da tabela e o espaçamento das células */
#lista-musicas td {
    padding: 8px 4px; /* Reduzido de 12px para 8px vertical e 4px horizontal */
    font-size: 0.75rem; /* Fonte menor */
}

/* Ajuste específico para o Título (que tem peso 600 no JS) */
#lista-musicas td:nth-child(3) {
    font-size: 0.85rem; 
    max-width: 120px; /* Reduzi um pouco mais para caber melhor */
}

/* Reduz o tamanho dos botões de ação e dos ícones dentro deles */
.btn-icon {
    padding: 4px; /* Área de toque menor, mas ainda acessível */
    background: none;
    border: none;
    display: flex;
    align-items: center;
}

.btn-icon .material-icons {
    font-size: 18px !important; /* Ícones menores (padrão é 24px) */
}

/* Ajuste para telas muito pequenas (Mobile) */
@media (max-width: 400px) {
    #lista-musicas td {
        padding: 6px 2px;
    }
    
    /* Se o nome do artista for muito grande, também coloca reticências */
    #lista-musicas td:nth-child(2) {
        max-width: 80px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
}
/* Tooltip customizado */
.tooltip-item::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%; /* aparece acima do ícone */
  left: 50%;
  transform: translateX(-50%);
  background-color: #333;
  color: #fff;
  padding: 5px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  font-size: 13px;
  z-index: 10;
}

.tooltip-item:hover::after {
  opacity: 1;
}

    </style>
</head>
<body>
    <div class="top-bar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; background: #fff; border-bottom: 1px solid #ddd; position: relative; overflow: visible;">
    
    <div class="logo" style="display: flex; align-items: center; gap: 8px; color: #186879; font-weight: 800;">
        <span class="material-icons">music_note</span>
        <span>Biblioteca</span>
    </div>
    
    <div class="fab-container" style="position: relative; z-index: 9999;">
        <button class="fab-trigger" onclick="toggleFabMenu()" style="background: #186879; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            <span class="material-icons">add</span>
        </button>

        <div class="fab-menu" id="fab-menu" style="display: none; position: absolute; right: 0; top: 45px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #eee; overflow: visible; min-width: 60px;">
            
<a href="config.html" class="tooltip-item" data-tooltip="Configurações" style="display: flex; align-items: center; justify-content: center; padding: 15px; text-decoration: none; border-bottom: 1px solid #f5f5f5;">
  <span class="material-icons" style="color: #186879; font-size: 24px;">settings</span>
</a>

<a href="repertorio.html" class="tooltip-item" data-tooltip="Meus Repertórios" style="display: flex; align-items: center; justify-content: center; padding: 15px; text-decoration: none; border-bottom: 1px solid #f5f5f5;">
  <span class="material-icons" style="color: #fbc02d; font-size: 24px;">format_list_bulleted</span>
</a>
        </div>
    </div>
</div>

<main style="max-width: 900px; margin: 0 auto; width: 100%;">
    <div class="search-filter-container">
        <div class="search-wrapper">
            <span class="material-icons search-icon">search</span>
            <input class="search-input" id="busca" placeholder="Buscar música ou artista..." type="text"/>
        </div>
        <select class="genero-select" id="genero-select">
            <option value="">Todos os Gêneros</option>
        </select>
    </div>

    <div class="music-list" id="tabela-container">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid var(--outline); color: var(--on-surface-variant); font-size: 0.8rem;">
                    <th style="padding: 8px;">Gênero</th>
                    <th style="padding: 8px;">Artista</th>
                    <th style="padding: 8px;">Título</th>
                    <th style="padding: 8px; text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="lista-musicas">
                </tbody>
        </table>
    </div>
</main>

<style>
    #modal-favoritos {
        position: fixed; 
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); 
        display: none; /* Começa escondido */
        align-items: center; 
        justify-content: center; 
        z-index: 10000;
    }
    .modal-fav-content {
        background: white; 
        width: 90%; 
        max-width: 400px; 
        border-radius: 12px;
        padding: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .lista-reps-modal {
        max-height: 300px; 
        overflow-y: auto; 
        margin: 15px 0;
        border: 1px solid #eee;
        border-radius: 8px;
    }
    .item-rep-modal {
        padding: 15px; 
        border-bottom: 1px solid #eee; 
        cursor: pointer;
        display: flex; 
        align-items: center; 
        gap: 12px; 
        transition: background 0.2s;
    }
    .item-rep-modal:hover { 
        background: #f0f7f8; 
    }
    .item-rep-modal b {
        color: #333;
        font-size: 0.95rem;
    }
</style>
<script>
    function toggleFabMenu() {
        const menu = document.getElementById('fab-menu');
        if (menu.style.display === 'none' || menu.style.display === '') {
            menu.style.display = 'block';
            // Adiciona um listener para fechar ao clicar fora
            setTimeout(() => {
                document.addEventListener('click', closeMenuOutside);
            }, 1);
        } else {
            menu.style.display = 'none';
        }
    }

    function closeMenuOutside(event) {
        const menu = document.getElementById('fab-menu');
        const trigger = document.querySelector('.fab-trigger');
        
        if (!menu.contains(event.target) && !trigger.contains(event.target)) {
            menu.style.display = 'none';
            document.removeEventListener('click', closeMenuOutside);
        }
    }
</script>

<div id="modal-favoritos">
    <div class="modal-fav-content">
        <h3 style="color: #186879; margin-top: 0;">Adicionar ao Repertório</h3>
        <p style="font-size: 0.8rem; color: #666;">Escolha uma lista para salvar esta música:</p>
        
        <div id="lista-reps-modal" class="lista-reps-modal">
            </div>

        <button onclick="document.getElementById('modal-favoritos').style.display='none'" 
                style="width: 100%; padding: 12px; border: none; background: #ececec; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555;">
            CANCELAR
        </button>
    </div>
</div>
