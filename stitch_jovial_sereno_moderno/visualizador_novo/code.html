<body class="bg-background text-on-surface overflow-hidden">
<!-- Top Navigation Bar (Shared Component Logic Applied) -->
<!-- SUPPRESSION RULE: The TopAppBar is rendered here as a contextual header for the viewer task. -->
<header class="fixed top-0 w-full z-50 bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50/50 transition-colors active:scale-95 duration-150 text-blue-700">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline font-bold text-xl tracking-tight text-on-surface">Nocturne Op. 9 No. 2</h1>
<span class="text-[10px] font-label font-semibold uppercase tracking-widest text-on-surface-variant">Frédéric Chopin • Piano Solo</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50/50 transition-colors text-blue-700">
<span class="material-symbols-outlined">edit</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-blue-50/50 transition-colors text-blue-700">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content: Sheet Music Canvas -->
<main class="h-screen w-screen pt-24 pb-32 px-4 md:px-8 flex justify-center items-start overflow-y-auto bg-surface">

<p class="text-on-surface-variant font-medium">Andante</p>
</div>
<!-- Abstract Musical Notation (Visual Representation) -->
<div class="space-y-16">
<!-- Stave 1 -->
<div class="h-24 w-full border-y border-outline-variant/20 relative flex items-center">
<div class="absolute left-0 top-0 bottom-0 flex flex-col justify-between py-2">
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
</div>
<div class="ml-4 text-3xl font-serif text-on-surface/40">𝄞</div>
</div>
<!-- Stave 2 -->
<div class="h-24 w-full border-y border-outline-variant/20 relative flex items-center">
<div class="absolute left-0 top-0 bottom-0 flex flex-col justify-between py-2">
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>

<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
</div>
<div class="ml-4 text-3xl font-serif text-on-surface/40">𝄞</div>
</div>
</div>

</main>

<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3">

<div class="bg-white/70 backdrop-blur-2xl border border-white/40 shadow-xl rounded-full px-6 py-3 flex items-center gap-6">
<!-- Paging Controls -->
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container-high transition-colors active:scale-90 text-primary">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container-high transition-colors active:scale-90 text-primary">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Divider -->
<div class="w-[1px] h-6 bg-outline-variant/30"></div>
<!-- Zoom/Tool Controls -->
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-primary/10 transition-colors text-primary font-label text-[10px] font-bold">

<span>100%</span>
</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Secondary Toggle (Metronome Glass) -->
<button class="w-14 h-14 bg-secondary-container/80 backdrop-blur-xl border border-white/20 shadow-xl rounded-2xl flex flex-col items-center justify-center text-on-secondary-container hover:bg-secondary-container transition-all active:scale-95">
<span class="material-symbols-outlined text-xl">timer</span>
<span class="text-[8px] font-bold tracking-tighter uppercase mt-0.5">88 BPM</span>

</div>
