<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#2c6b59",
                    "tertiary-container": "#ff9f92",
                    "on-primary": "#f9f8ff",
                    "surface-container-high": "#e4e8f2",
                    "primary-fixed": "#abbfff",
                    "outline": "#767b84",
                    "surface-container": "#ebeef6",
                    "on-surface-variant": "#5a5f68",
                    "on-secondary-fixed": "#034e3d",
                    "tertiary-fixed-dim": "#ff8a7a",
                    "surface-variant": "#dee3ed",
                    "on-tertiary-fixed-variant": "#7a1c14",
                    "primary-container": "#abbfff",
                    "tertiary-dim": "#953025",
                    "on-primary-fixed": "#002264",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#264187",
                    "secondary-fixed": "#b7f9e0",
                    "on-primary-container": "#1b387d",
                    "on-surface": "#2d333b",
                    "on-tertiary": "#fff7f6",
                    "error-container": "#f56965",
                    "inverse-primary": "#98b1fe",
                    "tertiary": "#a53c30",
                    "on-error-container": "#65000b",
                    "primary-fixed-dim": "#98b1fe",
                    "tertiary-fixed": "#ff9f92",
                    "secondary-container": "#b7f9e0",
                    "primary": "#425ca3",
                    "primary-dim": "#355096",
                    "outline-variant": "#adb2bc",
                    "on-error": "#fff7f6",
                    "on-secondary": "#e4fff3",
                    "background": "#f8f9ff",
                    "surface": "#f8f9ff",
                    "on-background": "#2d333b",
                    "secondary-fixed-dim": "#a9ead3",
                    "secondary": "#2a6a57",
                    "inverse-on-surface": "#9b9da2",
                    "error": "#ac3434",
                    "on-secondary-container": "#20614f",
                    "surface-dim": "#d4dae6",
                    "secondary-dim": "#1b5d4b",
                    "surface-bright": "#f8f9ff",
                    "inverse-surface": "#0b0e12",
                    "error-dim": "#70030f",
                    "on-tertiary-fixed": "#4a0001",
                    "surface-container-low": "#f1f3fa",
                    "surface-container-highest": "#dee3ed",
                    "surface-tint": "#425ca3",
                    "on-tertiary-container": "#6d130c"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .music-canvas-shadow {
            box-shadow: 0 10px 40px -10px rgba(45, 51, 59, 0.1);
        }
        .glass-toolbar {
            background: rgba(248, 249, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar (Transactional Shell Logic: Back button suppresses main nav) -->
<header class="w-full top-0 sticky z-50 bg-gradient-to-b from-[#f8f9ff] to-transparent">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-[#425ca3] hover:bg-slate-200/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline font-bold text-xl tracking-tight text-[#425ca3]">Nocturne Op. 9 No. 2</h1>
<span class="font-label text-[10px] font-semibold uppercase tracking-wider text-slate-500">Frédéric Chopin</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-[#425ca3] hover:bg-slate-200/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-[#425ca3] hover:bg-slate-200/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</div>
</header>
<!-- Main Score Viewport -->
<main class="flex-1 overflow-auto px-4 md:px-12 pb-32 pt-4 flex justify-center items-start bg-surface-container-low">
<div class="relative w-full max-w-4xl bg-white music-canvas-shadow rounded-lg overflow-hidden flex flex-col items-center">
<!-- Sheet Music Content Container -->
<div class="w-full h-auto min-h-[1200px] bg-white p-8 md:p-16">
<!-- Visual Placeholder for Sheet Music -->
<div class="w-full aspect-[3/4] flex flex-col gap-6">
<!-- Top margin/Title placeholder -->
<div class="w-full h-2 bg-on-surface/5 rounded-full mb-8"></div>
<!-- Simulated Staff Lines (The Design System's High-Contrast aesthetic) -->
<div class="space-y-12">
<div class="flex flex-col gap-1.5">
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
</div>
<!-- Decorative Score Image -->
<div class="relative group">
<img alt="Piano Sheet Music" class="w-full rounded-sm opacity-90" data-alt="vintage piano sheet music with detailed black ink musical notation on cream-colored high-quality paper texture sharp focus and clean lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAn8V_2WKS8iKs0TF6vS2_sC6AWo15ieJGa6Jo26YZ-DzIx9VrA01b6_gVUPWhSBmOeWsq5DYo1HWdEg4aI0DjnudT075xmXnbdqs0UzIC-ihH7rEHpZ1NHC7SgNpEvke3C9sg84808mwDkGbjYwQe-KFQ4aDPGI-A8-bHNzfWo0Nrzs9Ipl-ySKOA24_B1ynzU3iiJsVFNuSdS7O8rHUmpm0WeBV6_vVxj5PqB1YX99RBf1OBi6q5sPOTTOkjkpT5ZRoYZakiTPyw"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
</div>
<div class="flex flex-col gap-1.5">
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
<div class="h-[2px] w-full bg-on-surface/80"></div>
</div>
</div>
</div>
</div>
<!-- Page Number Overlay (Discrete) -->
<div class="absolute bottom-6 right-8 font-label text-[12px] font-bold text-on-surface/40">
                PAGE 1 / 4
            </div>
</div>
</main>
<!-- Contextual "Floating Maestro" Toolbar -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-xl">
<div class="glass-toolbar rounded-full shadow-[0_8px_40px_rgba(45,51,59,0.12)] px-8 py-3 flex items-center justify-between gap-4">
<!-- Page Navigation -->
<div class="flex items-center gap-1">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-primary hover:bg-primary/10 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<div class="px-4 py-1.5 rounded-full bg-primary/5">
<span class="font-label font-bold text-primary">01</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-primary hover:bg-primary/10 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Zoom Controls -->
<div class="flex items-center bg-white/40 rounded-full px-2">
<button class="w-8 h-8 flex items-center justify-center text-primary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
</button>
<span class="font-label font-bold text-primary px-3 text-[12px]">100%</span>
<button class="w-8 h-8 flex items-center justify-center text-primary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
</button>
</div>
<!-- Action Cluster -->
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-secondary-container text-on-secondary-container hover:brightness-95 transition-all">
<span class="material-symbols-outlined" data-icon="screen_rotation">screen_rotation</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-white shadow-md hover:shadow-lg transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="fullscreen">fullscreen</span>
</button>
</div>
</div>
</div>
<!-- Static Metronome Indicator (Corner) -->
<div class="fixed top-24 right-8 z-40">
<div class="bg-surface-container-lowest/80 backdrop-blur-md rounded-2xl px-4 py-3 shadow-sm border border-outline-variant/10 flex flex-col items-center gap-1 group cursor-default">
<span class="material-symbols-outlined text-tertiary" data-icon="metronome" style="font-variation-settings: 'FILL' 1;">timer</span>
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-primary text-lg leading-tight">88</span>
<span class="font-label text-[10px] font-bold text-primary/60">BPM</span>
</div>
<!-- Pulse dot -->
<div class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse mt-1"></div>
</div>
</div>
<!-- Annotation Chips (Difficulty/Mood) - From Design System -->
<div class="fixed top-24 left-8 z-40 flex flex-col gap-3">
<div class="flex items-center gap-2 bg-surface-container-lowest/80 backdrop-blur-md rounded-full pl-2 pr-4 py-1.5 shadow-sm">
<div class="w-6 h-6 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-tertiary-fixed" data-icon="grade" style="font-variation-settings: 'FILL' 1;">grade</span>
</div>
<span class="font-label text-[11px] font-bold text-on-surface">Intermediate</span>
</div>
<div class="flex items-center gap-2 bg-surface-container-lowest/80 backdrop-blur-md rounded-full pl-2 pr-4 py-1.5 shadow-sm">
<div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-secondary-container" data-icon="mood" style="font-variation-settings: 'FILL' 1;">mood</span>
</div>
<span class="font-label text-[11px] font-bold text-on-surface">Melancholic</span>
</div>
</div>
</body></html>
