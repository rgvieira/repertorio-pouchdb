<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="initial-scale=1, width=device-width, viewport-fit=cover" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <title>Configurações - Repertório</title>
    <style>
        :root { --primary: #186879; }
        body { font-family: 'Manrope', sans-serif; margin: 0; background: #f9f9f9; color: #333; }
        .top-bar { display: flex; align-items: center; padding: 0 16px; height: 56px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 800; text-decoration: none; }
        main { max-width: 900px; margin: 0 auto; padding: 16px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 16px; }
        h3 { margin: 0 0 12px 0; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        p { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        
        /* Interface do Modal Picker (Android) */
        #modalPicker {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10001; flex-direction: column;
        }
        .picker-header { padding: 16px; background: #222; display: flex; justify-content: space-between; align-items: center; }
        #listaPastas { flex: 1; overflow-y: auto; padding: 8px; }
        .picker-footer { padding: 16px; display: flex; gap: 10px; background: #222; }
        .btn-picker { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="logo">
            <span class="material-icons">arrow_back</span>
            <span>Configurações</span>
        </a>
    </div>

    <main>
        <div class="card">
            <h3><span class="material-icons">folder</span> Gerenciar Pastas</h3>
            <p>Selecione as pastas do seu dispositivo que contêm as partituras em PDF.</p>
            
            <!-- BOTÃO DE TESTE IMPLEMENTADO -->
            <button id="btnTestarFolderPicker" style="margin: 10px 0; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span class="material-icons">ads_click</span>
                🧪 TESTAR FOLDERPICKER
            </button>
            <div id="testeResultado" style="margin: 10px 0; padding: 12px; display: none; border-radius: 8px; border: 1px solid #ddd; font-family: monospace; font-size: 0.8rem; word-break: break-all;"></div>
        </div>
    </main>

    <!-- Estrutura necessária para o FolderPicker Android funcionar -->
    <div id="modalPicker">
        <div class="picker-header">
            <div style="overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-right: 10px;">
                <small style="color: #aaa; display: block;">Caminho:</small>
                <span id="currentPathLabel" style="color: #fff; font-size: 0.85rem;">/</span>
            </div>
            <button onclick="FolderPicker.fechar()" style="background:none; border:none; color:#fff;"><span class="material-icons">close</span></button>
        </div>
        <div id="listaPastas"></div>
        <div class="picker-footer">
            <button class="btn-picker" onclick="FolderPicker.voltar()" style="background: #444; color: white;">VOLTAR</button>
            <button class="btn-picker" onclick="FolderPicker.confirmar()" style="background: var(--primary); color: white;">SELECIONAR</button>
        </div>
    </div>

    <!-- Carregamento de Scripts -->
    <script src="js/pouchdb.min.js"></script>
    <script src="js/pouchdb.find.min.js"></script>
    <script src="js/database.js"></script>
    <script src="js/scanner.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
