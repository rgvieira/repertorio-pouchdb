{% extends "base.html" %}

{% block content %}
<!-- Container com HTMX para filtro dinâmico -->
<div class="search-filter-container">
    <div class="search-wrapper" style="flex: 1;">
        <span class="material-icons search-icon">search</span>
        <input type="text" name="busca" class="search-input" placeholder="Buscar..." value="{{ busca }}" hx-get="/"
            hx-target="#tabela-musicas" hx-trigger="input changed delay:500ms" hx-push-url="true"
            hx-select="#tabela-musicas" hx-swap="outerHTML">
    </div>
    <select name="genero" class="genero-select" style="width: auto; min-width: 150px; margin-left: 8px;" hx-get="/"
        hx-target="#tabela-musicas" hx-trigger="change" hx-push-url="true" hx-select="#tabela-musicas"
        hx-swap="outerHTML">
        {% for g in generos %}
        <option value="{{ g }}" {% if g==genero_selecionado %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
    </select>
</div>

<!-- Tabela de músicas (será atualizada pelo HTMX) -->
<div id="tabela-musicas">
    <table class="music-table">
        <thead>
            <tr>
                <th>Gênero</th>
                <th>Artista</th>
                <th>Título</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for musica in musicas %}
            <tr>
                <td>{{ musica[0] }}</td>
                <td>{{ musica[1] }}</td>
                <td>{{ musica[2] }}</td>
                <td class="actions-cell">
                    <a href="/viewer?arquivo={{ musica[3] | urlencode }}&titulo={{ musica[2] | urlencode }}"
                        class="action-link" title="Visualizar partitura">
                        <span class="material-icons">music_note</span>
                    </a>
                    <a href="/letra?titulo={{ musica[2] | urlencode }}&artista={{ musica[1] | urlencode }}"
                        class="action-link" target="_blank" title="Ver letra">
                        <span class="material-icons">subtitles</span>
                    </a>
                    <a href="/video?titulo={{ musica[2] | urlencode }}&artista={{ musica[1] | urlencode }}"
                        class="action-link" target="_blank" title="Assistir vídeo">
                        <span class="material-icons">music_video</span>
                    </a>
                    <a href="/download/{{ musica[3] | urlencode }}" class="action-link" target="_blank"
                        title="Baixar arquivo">
                        <span class="material-icons">get_app</span>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
